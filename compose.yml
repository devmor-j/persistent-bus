services:
  db:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    volumes:
      - ./vol/db:/var/lib/postgresql
    environment:
      POSTGRES_DB: "persistent-bus"
      POSTGRES_USER: "postgres"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    ports:
      - 5432:5432
    user: root
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:8-alpine3.23
    ports:
      - "6379:6379"
    volumes:
      - ./vol/redis:/data
    command: redis-server --appendonly yes
